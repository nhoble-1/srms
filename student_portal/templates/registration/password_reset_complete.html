{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link href="{% static 'css/auth.css' %}" rel="stylesheet">
{% endblock %}

{% block auth_content %}
<div class="auth-page">
    <div class="auth-blob-1"></div>
    <div class="auth-blob-2"></div>

    <div class="auth-card-wrap container" style="max-width: 480px;">
        <div class="shadow-lg" style="border-radius:20px; overflow:hidden;">

            <!-- Header -->
            <div class="register-header" style="background: linear-gradient(135deg, #198754, #20c997);">
                <div class="register-logo-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h3 class="register-title">Password Reset!</h3>
                <p class="register-subtitle">Your password has been changed successfully</p>
            </div>

            <!-- Body -->
            <div class="register-form-panel bg-white text-center">
                <div class="mb-4">
                    <i class="bi bi-shield-check text-success" style="font-size: 3.5rem;"></i>
                </div>

                <p class="mb-4" style="font-size:0.95rem; color:#374151;">
                    Your password has been updated. You can now sign in to the student portal
                    with your new password.
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary w-100 py-3 fw-bold auth-submit-btn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
